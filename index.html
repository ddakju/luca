<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>우리 아이들 — LUCA</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  :root{
    --paper:#F2EEE5; --paper-edge:#E8E2D4; --card:#FBF8F1;
    --ink:#2A2620; --ink-soft:#6E665A; --ink-faint:#A79D8C;
    --line:#E4DCCC; --line-soft:#EEE8DA;
    --copper:#A6562F; --copper-ink:#8A4622; --copper-soft:#F0E3D6;
    --slate:#4F6B82; --slate-soft:#E2E8EE; --slate-line:#CFDAE3;
    --brick:#A33F33; --brick-soft:#F2DED9;
    --olive:#5F6B3F;
    --sans:'Pretendard',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--paper)}
  body{font-family:var(--sans);color:var(--ink);-webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;font-variant-numeric:tabular-nums;line-height:1.6}
  body[data-lang="ja"] [data-only="ko"]{display:none!important}
  body[data-lang="ko"] [data-only="ja"]{display:none!important}
  .app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--paper);position:relative}
  .view{display:none;padding:0 18px;animation:fade .25s ease}
  .view.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
  .pad{padding-bottom:96px}

  /* masthead */
  .mast{padding:20px 2px 0}
  .mast-top{display:flex;align-items:center;justify-content:space-between}
  .mast-top .t{font-size:18px;font-weight:700;letter-spacing:-.02em}
  .mast-top .e{font-size:11px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-faint);margin-left:8px}
  .toggle{display:inline-flex;border:1px solid var(--line);border-radius:999px;overflow:hidden;background:var(--card)}
  .toggle button{font:inherit;font-size:12px;font-weight:600;border:none;cursor:pointer;padding:5px 12px;background:transparent;color:var(--ink-faint);transition:.15s}
  .toggle button.on{background:var(--ink);color:var(--paper)}
  .mast-line{display:flex;align-items:center;gap:10px;margin-top:14px;padding-bottom:6px;border-bottom:1px solid var(--line)}
  .mast-line .lab{font-size:10px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-faint);white-space:nowrap}
  .mast-line .rule{flex:1;height:1px;background:var(--line)}
  .mast-line .yr{font-size:11px;font-weight:500;letter-spacing:.06em;color:var(--ink-faint)}

  /* dog cards */
  .dogs{padding-top:18px}
  .dog{display:flex;gap:14px;align-items:center;background:var(--card);border:1px solid var(--line);
    border-radius:14px;padding:13px 14px;margin-bottom:11px;width:100%;text-align:left;font:inherit;color:inherit;cursor:pointer;transition:.15s}
  .dog:hover{border-color:#D8CDB7}
  .dog:active{transform:scale(.992)}
  .dog.empty{border-style:dashed;background:#F7F3EB;cursor:pointer}
  .dpic{width:62px;height:62px;border-radius:12px;flex:none;object-fit:cover;object-position:50% 32%;border:1px solid var(--line);background:var(--copper-soft)}
  .dpic-ph{width:62px;height:62px;border-radius:12px;flex:none;border:1px solid var(--line);background:var(--copper-soft);color:var(--copper);display:flex;align-items:center;justify-content:center}
  .dog.empty .dpic-ph{background:var(--paper-edge);color:#BCB2A1}
  .dpic-ph svg{width:30px;height:30px}
  .dinfo{flex:1;min-width:0}
  .dn{display:flex;align-items:center;gap:8px}
  .dn b{font-size:18px;font-weight:700;color:var(--ink);letter-spacing:-.01em}
  .sx{font-size:11px;font-weight:600;padding:1px 8px;border-radius:5px;background:var(--slate-soft);color:var(--slate);white-space:nowrap}
  .sx.f{background:#F4E3EA;color:#A8587A}
  .sx.m{background:var(--paper-edge);color:var(--ink-faint)}
  .dm{font-size:12.5px;color:var(--ink-soft);margin-top:4px}
  .dm.faint{color:var(--ink-faint)}
  .dm b{font-weight:600;color:var(--ink)}
  .dgo{flex:none;color:var(--ink-faint)}
  .dgo svg{width:18px;height:18px;display:block}

  /* profile */
  .pf-top{display:flex;align-items:center;gap:12px;padding:18px 2px 4px}
  .back{display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:10px;
    border:1px solid var(--line);background:var(--card);color:var(--ink-soft);cursor:pointer;flex:none}
  .back svg{width:19px;height:19px}
  .pf-hero{display:flex;gap:15px;align-items:center;padding:14px 0 4px}
  .pf-hero .pic{width:84px;height:84px;border-radius:14px;flex:none;object-fit:cover;object-position:50% 32%;border:1px solid var(--line)}
  .pf-hero h1{font-size:25px;font-weight:700;letter-spacing:-.02em}
  .pf-hero .breed{font-size:12.5px;color:var(--ink-soft);margin-top:4px}
  .tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
  .tag{font-size:11.5px;font-weight:500;padding:3px 9px;border-radius:6px;background:var(--paper-edge);color:var(--ink-soft);border:1px solid var(--line)}
  .tag.eye{background:var(--slate-soft);color:var(--slate);border-color:var(--slate-line)}
  .eyebrow{display:flex;align-items:center;gap:10px;margin:24px 0 12px}
  .eyebrow .k{font-size:12.5px;font-weight:600;color:var(--ink)}
  .eyebrow .tick{width:14px;height:1px;background:var(--copper)}
  .eyebrow .rule{flex:1;height:1px;background:var(--line)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:15px 16px;margin-bottom:11px}
  .spec{display:flex;justify-content:space-between;gap:12px;padding:7px 0;border-bottom:1px dashed var(--line);font-size:13.5px}
  .spec:last-child{border-bottom:none}
  .spec .k{color:var(--ink-faint)} .spec .v{color:var(--ink);font-weight:600;text-align:right}
  ul.clean{list-style:none} ul.clean li{position:relative;padding:6px 0 6px 16px;font-size:13.5px;color:var(--ink-soft);border-bottom:1px dashed var(--line)}
  ul.clean li:last-child{border-bottom:none}
  ul.clean li::before{content:"";position:absolute;left:2px;top:13px;width:5px;height:5px;border-radius:50%;background:var(--copper)}
  ul.clean li b{color:var(--ink);font-weight:600}
  .callout{border-radius:12px;padding:14px 15px;border:1px solid;margin-bottom:11px}
  .callout .t{font-weight:700;margin-bottom:6px;font-size:14px}
  .callout p,.callout li{font-size:13px;line-height:1.6}
  .callout.info{background:var(--slate-soft);border-color:var(--slate-line)} .callout.info .t{color:var(--slate)}
  .callout.warn{background:#FBF1DE;border-color:#EBD9B4} .callout.warn .t{color:#9A6B1E}
  .callout.danger{background:var(--brick-soft);border-color:#EBC9C2} .callout.danger .t{color:var(--brick)}
  .callout ul{list-style:none;margin-top:5px} .callout li{padding:3px 0 3px 14px;position:relative;color:var(--ink-soft)}
  .callout li::before{content:"·";position:absolute;left:4px;color:var(--ink-faint);font-weight:800} .callout b{color:var(--ink)}
  .pf-link{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;font:inherit;font-size:14px;font-weight:600;
    cursor:pointer;color:#fff;background:var(--copper);border:none;border-radius:11px;padding:13px;margin-top:4px}
  .pf-link svg{width:17px;height:17px}
  .pf-empty{text-align:center;padding:48px 20px;color:var(--ink-faint)}
  .pf-empty .mk{width:60px;height:60px;border-radius:16px;margin:0 auto 16px;background:var(--paper-edge);color:#BCB2A1;display:flex;align-items:center;justify-content:center}
  .pf-empty .mk svg{width:30px;height:30px}
  .pf-empty h2{font-size:18px;color:var(--ink-soft);margin-bottom:6px;font-weight:600}
  .pf-empty p{font-size:13px}

  /* generic placeholder for unbuilt tabs */
  .soon{text-align:center;padding:64px 24px;color:var(--ink-faint)}
  .soon .mk{width:56px;height:56px;border-radius:15px;margin:0 auto 16px;background:var(--copper-soft);color:var(--copper);display:flex;align-items:center;justify-content:center}
  .soon .mk svg{width:27px;height:27px}
  .soon h2{font-size:19px;color:var(--ink-soft);margin-bottom:7px;font-weight:600}
  .soon p{font-size:13px}

  /* ===== 용품 ===== */
  .gbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:16px 0 6px}
  .gstats{display:flex;gap:6px}
  .gstat{background:var(--card);border:1px solid var(--line);border-radius:9px;padding:6px 11px;font-size:12px;color:var(--ink-soft)}
  .gstat b{color:var(--ink);font-weight:700;margin-left:3px}
  .gstat.need b{color:var(--brick)}
  .gfilters{display:flex;gap:6px;margin-left:auto}
  .fbtn{font:inherit;font-size:12.5px;font-weight:600;cursor:pointer;color:var(--ink-soft);background:var(--card);border:1px solid var(--line);padding:6px 11px;border-radius:8px;transition:.12s}
  .fbtn.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .ghint{font-size:11.5px;color:var(--ink-faint);margin:4px 2px 14px;line-height:1.5}
  .cat{margin-bottom:18px}
  .cathead{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:700;color:var(--copper);letter-spacing:.04em;margin:0 2px 9px;text-transform:uppercase}
  .cathead .cnt{font-weight:600;color:var(--ink-faint);background:var(--copper-soft);padding:1px 7px;border-radius:999px;font-size:10.5px}
  .prow{display:flex;align-items:center;gap:11px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 13px;margin-bottom:8px;transition:.15s}
  .prow.have{opacity:.55}
  .pchk{width:20px;height:20px;flex:none;cursor:pointer;accent-color:var(--copper)}
  .pinfo{flex:1;min-width:0}
  .ptop{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
  .pname{font-size:14px;font-weight:600;color:var(--ink)}
  .prow.have .pname{text-decoration:line-through}
  .bdg{font-size:10px;font-weight:600;padding:1px 7px;border-radius:5px;background:var(--copper-soft);color:var(--copper-ink)}
  .pmeta{font-size:11.5px;color:var(--ink-faint);margin-top:3px}
  .pbuyrow{display:flex;align-items:center;gap:8px;margin-top:7px;flex-wrap:wrap}
  .pnext{font-size:11.5px;font-weight:600;color:var(--copper-ink);background:var(--copper-soft);padding:3px 8px;border-radius:6px;font-variant-numeric:tabular-nums}
  .pnext.over{background:var(--brick-soft);color:var(--brick)}
  .pset{font:inherit;font-size:11.5px;font-weight:600;color:var(--slate);background:none;border:1px dashed var(--slate-line);padding:3px 9px;border-radius:6px;cursor:pointer}
  .pedit{font:inherit;font-size:11px;color:var(--ink-faint);background:none;border:none;cursor:pointer;text-decoration:underline}
  .pprice{font-size:13.5px;font-weight:700;color:var(--ink);white-space:nowrap;flex:none;font-variant-numeric:tabular-nums}
  .pprice.none{font-size:11.5px;font-weight:600;color:var(--ink-faint)}
  .pbuy{font-size:11.5px;font-weight:700;color:#fff;text-decoration:none;white-space:nowrap;background:var(--copper);padding:6px 11px;border-radius:8px;flex:none}
  .pbuy.search{background:var(--paper-edge);color:var(--copper-ink)}
  .gcfg{background:var(--card);border:1px solid var(--slate-line);border-radius:12px;padding:13px 14px;margin:-3px 0 10px}
  .gcfg .seg{display:flex;gap:4px;background:var(--paper-edge);border-radius:9px;padding:3px;margin-bottom:12px}
  .gcfg .seg button{flex:1;font:inherit;font-size:12.5px;font-weight:600;color:var(--ink-soft);background:none;border:none;padding:7px 0;border-radius:7px;cursor:pointer}
  .gcfg .seg button.on{background:var(--card);color:var(--ink)}
  .gfield{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:9px}
  .gfield label{font-size:12.5px;color:var(--ink-soft)}
  .gfield input{font:inherit;font-size:13px;color:var(--ink);background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:7px 10px;width:140px;text-align:right;font-variant-numeric:tabular-nums}
  .gfield input[type=date]{text-align:left}
  .gest{font-size:12px;color:var(--copper-ink);background:var(--copper-soft);border-radius:8px;padding:8px 11px;margin:3px 0 11px;text-align:center;font-weight:600;font-variant-numeric:tabular-nums}
  .gbtns{display:flex;gap:7px}
  .gbtns button{font:inherit;font-size:13px;font-weight:600;cursor:pointer;border-radius:9px;padding:9px 0;flex:1;border:1px solid var(--line)}
  .gbtns .save{background:var(--copper);color:#fff;border-color:var(--copper);flex:2}
  .gbtns .cancel{background:var(--card);color:var(--ink-soft)}
  .gbtns .clear{background:var(--card);color:var(--brick);border-color:#EBC9C2}
  /* ===== 건강 ===== */
  .hsel{display:flex;gap:4px;background:var(--paper-edge);border-radius:10px;padding:4px;margin:16px 0 4px}
  .hsel button{flex:1;font:inherit;font-size:13px;font-weight:600;color:var(--ink-soft);background:none;border:none;padding:8px 0;border-radius:8px;cursor:pointer}
  .hsel button.on{background:var(--card);color:var(--ink)}
  .htime{font-size:11px;font-weight:600;color:var(--slate);background:var(--slate-soft);border:1px solid var(--slate-line);padding:5px 9px;border-radius:7px;white-space:nowrap;text-align:center;line-height:1.3;flex:none;font-variant-numeric:tabular-nums}
  .bdg.law{background:var(--brick-soft);color:var(--brick)}

  /* ===== 달력 ===== */
  .calnav{display:flex;align-items:center;gap:8px;margin:16px 0 12px}
  .calnav .mo{font-size:17px;font-weight:700;letter-spacing:-.01em;margin-right:auto}
  .calnav button{height:34px;width:34px;flex:none;border-radius:9px;border:1px solid var(--line);background:var(--card);color:var(--ink-soft);cursor:pointer;display:flex;align-items:center;justify-content:center}
  .calnav button:active{transform:scale(.95)}
  .calnav button svg{width:18px;height:18px}
  .calnav .today{width:auto;padding:0 13px;font:inherit;font-size:12.5px;font-weight:600;color:var(--ink-soft)}
  .calfilters{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
  .cchip{font:inherit;font-size:12px;font-weight:600;cursor:pointer;color:var(--ink-soft);background:var(--card);border:1px solid var(--line);padding:5px 12px;border-radius:999px;transition:.12s}
  .cchip.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .cchip.cdog.on{background:var(--copper);border-color:var(--copper)}
  .cgrid{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:10px 8px;margin-bottom:16px}
  .cdow{display:grid;grid-template-columns:repeat(7,1fr)}
  .cdow span{text-align:center;font-size:10.5px;font-weight:600;color:var(--ink-faint);padding:3px 0 6px}
  .cdow span.sun{color:var(--brick)}
  .cells{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
  .cell{aspect-ratio:1;border:none;background:none;font:inherit;cursor:pointer;border-radius:9px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;position:relative;color:var(--ink);padding:0}
  .cell.pad{visibility:hidden;pointer-events:none}
  .cell .d{font-size:13px;font-weight:600;line-height:1}
  .cell.sun .d{color:var(--brick)}
  .cell.today{background:var(--copper-soft)}
  .cell.today .d{color:var(--copper-ink);font-weight:700}
  .cell.sel{background:var(--ink)}
  .cell.sel .d{color:var(--paper)}
  .cell .mk{display:flex;gap:2px;height:5px;align-items:center;justify-content:center}
  .cell .dot{width:4px;height:4px;border-radius:50%;background:var(--ink-faint)}
  .cell.today .dot{background:var(--copper)}
  .cell.sel .dot{background:var(--paper)}
  .cell .st{position:absolute;top:4px;right:5px;color:var(--copper);font-size:8px;line-height:1}
  .cell.sel .st{color:#E8B96B}
  .cphead{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:2px 2px 11px}
  .cphead .lab{font-size:12.5px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint)}
  .cphead .sub{font-size:11px;color:var(--ink-faint);font-weight:500}
  .cphead .acts{display:flex;gap:6px;flex:none}
  .cphead .acts button{font:inherit;font-size:12px;font-weight:600;cursor:pointer;border-radius:8px;padding:6px 11px;border:1px solid var(--line);background:var(--card);color:var(--ink-soft)}
  .cphead .acts button.star.on{color:var(--copper);border-color:var(--copper-soft);background:var(--copper-soft)}
  .cprow{display:flex;align-items:center;gap:11px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 13px;margin-bottom:8px}
  .cprow.tap{cursor:pointer}
  .cprow.tap:active{transform:scale(.995)}
  .cprow .when{font-size:11.5px;font-weight:700;color:var(--copper-ink);background:var(--copper-soft);border-radius:6px;padding:3px 7px;white-space:nowrap;flex:none;min-width:40px;text-align:center;font-variant-numeric:tabular-nums}
  .cprow .when.over{background:var(--brick-soft);color:var(--brick)}
  .cprow .ci{flex:1;min-width:0}
  .cprow .ct{font-size:13.5px;font-weight:600;color:var(--ink)}
  .cprow .ct.done{text-decoration:line-through;color:var(--ink-faint)}
  .cprow .cm{font-size:11.5px;color:var(--ink-faint);margin-top:3px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
  .ckind{font-size:10px;font-weight:600;padding:1px 7px;border-radius:5px}
  .ckind.health{background:var(--slate-soft);color:var(--slate)}
  .ckind.supply{background:var(--copper-soft);color:var(--copper-ink)}
  .ckind.event{background:#E9EEDF;color:var(--olive)}
  .cprow .del,.cprow .go{flex:none;background:none;border:none;cursor:pointer;color:var(--ink-faint);padding:3px;display:flex}
  .cprow .del svg{width:15px;height:15px} .cprow .go svg{width:16px;height:16px}
  .cpempty{text-align:center;padding:32px 16px;color:var(--ink-faint);font-size:13px}
  .cadd{background:var(--card);border:1px solid var(--slate-line);border-radius:12px;padding:13px 14px;margin-bottom:10px}
  .cadd input,.cadd select{font:inherit;font-size:13px;color:var(--ink);background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:9px 10px;width:100%;margin-bottom:9px}
  .cadd .gbtns{display:flex;gap:7px}
  .cadd .gbtns button{font:inherit;font-size:13px;font-weight:600;cursor:pointer;border-radius:9px;padding:9px 0;flex:1;border:1px solid var(--line)}
  .cadd .gbtns .save{background:var(--copper);color:#fff;border-color:var(--copper);flex:2}
  .cadd .gbtns .cancel{background:var(--card);color:var(--ink-soft)}

  /* ===== 지식 ===== */
  .isearch-wrap{position:sticky;top:0;z-index:10;background:var(--paper);padding:8px 0 10px;margin-top:6px}
  .isearch{position:relative}
  .isearch input{width:100%;font:inherit;font-size:14px;color:var(--ink);background:var(--card);border:1px solid var(--line);border-radius:11px;padding:12px 14px 12px 40px;-webkit-appearance:none}
  .isearch input::placeholder{color:var(--ink-faint)}
  .isearch input:focus{outline:none;border-color:#D8CDB7}
  .isearch .mag{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:17px;height:17px;color:var(--ink-faint);pointer-events:none}
  .ichips{display:flex;gap:7px;overflow-x:auto;padding:2px 0 4px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .ichips::-webkit-scrollbar{display:none}
  .ichip{flex:none;font:inherit;font-size:12.5px;font-weight:600;cursor:pointer;color:var(--ink-soft);background:var(--card);border:1px solid var(--line);padding:6px 12px;border-radius:999px;white-space:nowrap}
  .ichip.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .ichip .c{margin-left:5px;font-size:11px;color:var(--ink-faint);font-variant-numeric:tabular-nums}
  .ichip.on .c{color:var(--paper-edge)}
  .icount{font-size:11.5px;color:var(--ink-faint);margin:13px 2px 10px;letter-spacing:.04em;font-variant-numeric:tabular-nums}
  .iitem{background:var(--card);border:1px solid var(--line);border-radius:12px;margin-bottom:9px;overflow:hidden}
  .ihead{display:flex;align-items:center;gap:10px;padding:13px 14px;cursor:pointer;width:100%;text-align:left;font:inherit;color:inherit;background:none;border:none}

function ymd(s){ const[y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
function ageText(birth){
  if(!birth) return '';
  const b=ymd(birth), n=new Date(), t0=new Date(n.getFullYear(),n.getMonth(),n.getDate());
  const days=Math.floor((t0-b)/864e5); if(days<0) return '';
  if(days<7)  return days+t('age.day');
  if(days<60){ return Math.floor(days/7)+t('age.week'); }
  let mo=(t0.getFullYear()-b.getFullYear())*12+(t0.getMonth()-b.getMonth()); if(t0.getDate()<b.getDate())mo--;
  if(mo<24) return mo+t('age.month');
  return Math.floor(mo/12)+t('age.year');
}
function birthText(birth){ if(!birth) return '—'; const b=ymd(birth); return b.getFullYear()+'. '+(b.getMonth()+1)+'. '+b.getDate(); }

(function(){

  const addD=(dt,n)=>{const x=new Date(dt);x.setDate(x.getDate()+n);return x;};
  const addM=(dt,n)=>{const x=new Date(dt);x.setMonth(x.getMonth()+n);return x;};
  const fmt=dt=>(dt.getMonth()+1)+'/'+dt.getDate();
  const key=(dog,p)=>dog+'|'+hid(p);

    if(w.type==='week'){if(!b)return t('h.tbd');return (ja?`生後${w.week}週`:`생후 ${w.week}주`)+'<br>~'+fmt(addD(b,w.week*7));}

    if(w.type==='deadline'){const base=w.base==='arrival'?a:b;if(!base)return t('h.tbd');return (ja?`${w.days}日以内`:`${w.days}일 내`)+'<br>~'+fmt(addD(base,w.days));}

(function(){
  const pad2=n=>String(n).padStart(2,'0');
  const iso=dt=>dt.getFullYear()+'-'+pad2(dt.getMonth()+1)+'-'+pad2(dt.getDate());
  const ymdC=s=>{const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);};
  const addD=(dt,n)=>{const x=new Date(dt);x.setDate(x.getDate()+n);return x;};
  const addM=(dt,n)=>{const x=new Date(dt);x.setMonth(x.getMonth()+n);return x;};
  const CF=(o,f)=>LANG==='ja'?(o[f+'_ja']||o[f]):o[f];
  const now=new Date(), today=new Date(now.getFullYear(),now.getMonth(),now.getDate()), todayISO=iso(today);
  const dday=s=>Math.round((ymdC(s)-today)/864e5);
  const mmdd=s=>{const d=ymdC(s);return(d.getMonth()+1)+'/'+d.getDate();};
  const fmtFull=s=>{const d=ymdC(s);return LANG==='ja'?`${d.getMonth()+1}月${d.getDate()}日`:`${d.getMonth()+1}월 ${d.getDate()}일`;};
  const dogName=id=>{const d=DOGS.find(x=>x.id===id);return d?F(d,'name'):'';};

    const b=dog.birth?ymdC(dog.birth):null,a=dog.arrival?ymdC(dog.arrival):null,w=p.when;
    if(w.type==='week')return b?addD(b,w.week*7):null;
    if(w.type==='month')return b?addM(b,w.month):null;
    if(w.type==='deadline'){const base=w.base==='arrival'?a:b;return base?addD(base,w.days):null;}

  }

    if(selDogs.size){ if(!it.dogId||!selDogs.has(it.dogId))return false; }

  }
  function addForm(){

  function renderBody(){

    if(sel){
      const day=all.filter(it=>it.date===sel).sort((a,b)=>(ORD[a.type]-ORD[b.type])||(a.title<b.title?-1:1));
      const on=!!stars[sel];
      html+=`<div class="cphead"><span class="lab">${fmtFull(sel)}</span><div class="acts"><button class="star ${on?'on':''}" data-star="${sel}">★ ${t('cal.star')}</button><button data-add>+ ${t('cal.add')}</button></div></div>`;
      if(adding)html+=addForm();
      html+=day.length?day.map(it=>rowHTML(it,false)).join(''):`<div class="cpempty">${t('cal.empty')}</div>`;
    }else{
      const end=addD(today,30);
      const up=all.filter(it=>{const d=ymdC(it.date);return d>=today&&d<=end;}).sort((a,b)=>a.date<b.date?-1:a.date>b.date?1:(ORD[a.type]-ORD[b.type]));
      html+=`<div class="cphead"><span class="lab">${t('cal.upcoming')}</span><span class="sub">${t('cal.days30')}</span></div>`;
      html+=up.length?up.map(it=>rowHTML(it,true)).join(''):`<div class="cpempty">${t('cal.emptyUp')}</div>`;
    }
    body.innerHTML=html;
  }
  function renderAll(){renderFilters();renderGrid();renderBody();}
  window._calRefresh=renderAll;

  function saveUser(){
    const title=(draft.title||'').trim(); if(!title||!sel)return;
    const id='u'+Date.now().toString(36)+Math.floor(Math.random()*1296).toString(36);
    const ev={date:sel,title,type:'event',dogId:draft.dogId||''};
    userEvents[id]=ev; persistUser(); window.LucaHub.save('userEvents',id,ev);
    adding=false; draft={title:'',dogId:''}; renderGrid(); renderBody();
  }
  function delUser(uid){
    if(!confirm(t('cal.delConfirm')))return;
    delete userEvents[uid]; persistUser(); window.LucaHub.save('userEvents',uid,null); renderGrid(); renderBody();
  }
  function toggleStar(ds){
    if(stars[ds])delete stars[ds];else stars[ds]=true;
    persistStars(); window.LucaHub.save('stars',ds,stars[ds]||false); renderGrid(); renderBody();
  }

  document.getElementById('calPrev').addEventListener('click',()=>{if(--viewM<0){viewM=11;viewY--;}renderGrid();});
  document.getElementById('calNext').addEventListener('click',()=>{if(++viewM>11){viewM=0;viewY++;}renderGrid();});
  document.getElementById('calToday').addEventListener('click',()=>{viewY=today.getFullYear();viewM=today.getMonth();sel=todayISO;adding=false;renderGrid();renderBody();});
  document.getElementById('calFilters').addEventListener('click',e=>{
    const c=e.target.closest('.cchip'); if(!c)return;
    const s=c.dataset.dog?selDogs:selTypes, v=c.dataset.dog||c.dataset.type;
    s.has(v)?s.delete(v):s.add(v); renderAll();
  });
  document.getElementById('calCells').addEventListener('click',e=>{
    const c=e.target.closest('.cell'); if(!c||!c.dataset.d)return;
    sel=(sel===c.dataset.d)?null:c.dataset.d; adding=false; renderGrid(); renderBody();
  });
  const bodyEl=document.getElementById('calBody');
  bodyEl.addEventListener('click',e=>{
    const star=e.target.closest('[data-star]'); if(star){toggleStar(star.dataset.star);return;}
    const ac=e.target.closest('[data-add-cancel]'); if(ac){adding=false;draft={title:'',dogId:''};renderBody();return;}
    const as=e.target.closest('[data-add-save]'); if(as){saveUser();return;}
    const add=e.target.closest('[data-add]'); if(add){adding=true;renderBody();return;}
    const del=e.target.closest('[data-del]'); if(del){delUser(del.dataset.del);return;}
    const row=e.target.closest('.cprow.tap'); if(row){ if(row.dataset.type==='health')window.openHealth(row.dataset.dog||'luca'); else if(row.dataset.type==='supply')showTab('gear'); }
  });
  bodyEl.addEventListener('input',e=>{const f=e.target.closest('[data-df]');if(f)draft[f.dataset.df]=f.value;});
  bodyEl.addEventListener('change',e=>{const f=e.target.closest('[data-df]');if(f)draft[f.dataset.df]=f.value;});

  LANGHOOKS.push(renderAll);
  window.LucaHub.onState('userEvents',ue=>{Object.keys(ue).forEach(k=>{if(ue[k]===null)delete userEvents[k];else userEvents[k]=ue[k];});persistUser();renderAll();});
  window.LucaHub.onState('stars',s=>{Object.keys(s).forEach(k=>{if(s[k]===false||s[k]===null)delete stars[k];else stars[k]=s[k];});persistStars();renderAll();});
  renderAll();
})();

// ---- 지식 (644 도감: 검색 우선 + 주제칩 + 아코디언) ----
(function(){
  const data=window.INFO;
  const listEl=document.getElementById('iList'),chipsEl=document.getElementById('iChips'),countEl=document.getElementById('iCount'),searchEl=document.getElementById('iSearch');
  const esc=s=>(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  if(!data||!Array.isArray(data.entries)||!data.entries.length){LANGHOOKS.push(()=>{listEl.innerHTML=`<div class="iguide"><p>—</p></div>`;});return;}
  const entries=data.entries; entries.forEach((e,i)=>e._no=i+1);
  const topics=data.topics||[], TJA=data.topics_ja||{};
  const eterm=e=>LANG==='ja'?(e.term_ja||e.term):e.term;
  const ebody=e=>LANG==='ja'?(e.body_ja||e.body):e.body;
  const tlabel=tp=>LANG==='ja'?(TJA[tp]||tp):tp;
  let topic=null, q='', open=new Set();
  function md(src){const inline=s=>esc(s).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');let html='',inList=false;
    (src||'').split('\n').forEach(raw=>{const line=raw.trim();
      if(line.startsWith('- ')){if(!inList){html+='<ul class="info-ul">';inList=true;}html+=`<li>${inline(line.slice(2))}</li>`;}
      else{if(inList){html+='</ul>';inList=false;}if(line)html+=`<p>${inline(line)}</p>`;}});
    if(inList)html+='</ul>'; return html;}
  function chips(){
    const all=`<button class="ichip ${topic==='all'?'on':''}" data-tp="all">${t('info.all')}<span class="c">${entries.length}</span></button>`;
    const tp=topics.map(tp=>{const c=entries.filter(e=>e.topic===tp).length;return c?`<button class="ichip ${topic===tp?'on':''}" data-tp="${esc(tp)}">${esc(tlabel(tp))}<span class="c">${c}</span></button>`:'';}).join('');
    chipsEl.innerHTML=all+tp;
  }
  const match=e=>{ if(topic&&topic!=='all'&&e.topic!==topic)return false; if(q){const hay=(eterm(e)+' '+ebody(e)+' '+tlabel(e.topic)).toLowerCase();if(!hay.includes(q))return false;} return true; };
  function itemHTML(e){
    const opened=open.has(e._no);
    const src=(e.sources&&e.sources.length)?`<div class="isrc"><span class="lab">${t('info.src')}</span>${e.sources.map((u,i)=>`<a href="${esc(u)}" target="_blank" rel="noopener">${t('info.video')}${e.sources.length>1?' '+(i+1):''}</a>`).join('')}</div>`:'';
    return `<div class="iitem ${opened?'open':''}" data-no="${e._no}"><button class="ihead"><span class="no">${t('info.no')}${e._no}</span><span class="tm">${esc(eterm(e))}</span><span class="tg">${esc(tlabel(e.topic))}</span><span class="cv"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></span></button><div class="ibody">${md(ebody(e))}${src}</div></div>`;
  }
  function render(){
    if(topic===null && !q){ countEl.textContent='';
      listEl.innerHTML=`<div class="iguide"><div class="mk"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3-3"/></svg></div><h2>${t('info.guideTitle')}</h2><p>${t('info.guide')}</p></div>`; return; }
    const items=entries.filter(match);
    countEl.textContent=items.length+t('info.count');
    listEl.innerHTML=items.length?items.map(itemHTML).join(''):`<div class="iguide"><p>${t('info.none')}</p></div>`;
  }
  chipsEl.addEventListener('click',e=>{const b=e.target.closest('.ichip');if(!b)return;topic=(topic===b.dataset.tp)?null:b.dataset.tp;open.clear();chips();render();});
  listEl.addEventListener('click',e=>{const h=e.target.closest('.ihead');if(!h)return;const it=h.closest('.iitem'),no=+it.dataset.no;if(open.has(no))open.delete(no);else open.add(no);it.classList.toggle('open');});
  searchEl.addEventListener('input',e=>{q=e.target.value.trim().toLowerCase();open.clear();render();});
  LANGHOOKS.push(()=>{chips();render();});
})();
